<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Attendance System</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Particles.js Library -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
:root {
  --bg-dark:#020617; 
  --bg-card:#0f172a; 
  --bg-item:#334155;
  --text-main:#f8fafc; 
  --text-muted:#94a3b8;
  --accent:#0ea5e9; 
  --accent-hover:#0284c7;
  --success: #10b981;
  --danger: #ef4444;
}

/* BODY & PARTICLES */
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: var(--text-main);
  position: relative;
  text-align: center;

  /* DARK background fix for particles */
  background-color: var(--bg-dark);
}

/* Particles container */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* CARD */
.card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 35px 40px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 400px;
  z-index: 2;
  position: relative;
  animation: fadeIn 0.5s ease;
}

h2 { text-align: center; margin-top: 0; }
p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem; }

.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--bg-item);
  background: var(--bg-dark);
  color: var(--text-main);
  font-size: 15px;
  box-sizing: border-box;
  transition: 0.3s;
}
input:focus, select:focus { border-color: var(--accent); outline: none; }

.btn {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  background: var(--accent);
  margin-top: 10px;
  transition: 0.3s;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled { background: var(--bg-item); cursor: not-allowed; }

#message { text-align: center; margin-top: 15px; font-size: 0.95rem; font-weight: bold; }
.success { color: var(--success); } 
.error { color: var(--danger); }

.nav-links { text-align: center; margin-top: 20px; font-size: 0.95rem; }
.nav-links a { color: var(--text-muted); text-decoration: none; transition: 0.2s; }
.nav-links a:hover { color: var(--text-main); }

@keyframes fadeIn { from { opacity:0; transform: translateY(5px);} to {opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<!-- PARTICLES BACKGROUND -->
<div id="particles-js"></div>

<div class="card">
  <h2>Account Recovery</h2>
  <p class="subtitle">Verify your identity to reset your password.</p>

  <form id="resetForm">
    <div class="form-group">
      <label>I am a...</label>
      <select id="role" name="role" onchange="updateFormUI()" required>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
    </div>

    <div class="form-group">
      <label id="idLabel">Student Number</label>
      <input type="text" id="user_id" name="user_id" required>
    </div>

    <div class="form-group">
      <label id="verificationLabel">Verify Full Name</label>
      <input type="text" id="verification_data" name="verification_data" placeholder="Type exactly as registered" required>
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new_password" name="new_password" required>
    </div>

    <button type="submit" class="btn" id="submitBtn">Reset Password</button>
    <div id="message"></div>

    <div class="nav-links">
      <a href="index.html">⬅ Cancel & Return to Home</a>
    </div>
  </form>
</div>

<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 70 },
    "color": { "value": "#38bdf8" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.5 },
    "size": { "value": 3 },
    "line_linked": {
      "enable": true,
      "distance": 150,
      "color": "#0ea5e9",
      "opacity": 0.4,
      "width": 1
    },
    "move": { "enable": true, "speed": 2 }
  },
  "interactivity": {
    "events": { "onhover": { "enable": true, "mode": "repulse" } }
  }
});

const API_BASE = "http://127.0.0.1:8000";
function updateFormUI() {
  const role = document.getElementById("role").value;
  if(role === "student"){
    document.getElementById("idLabel").textContent = "Student Number";
    document.getElementById("verificationLabel").textContent = "Verify Full Name";
  } else {
    document.getElementById("idLabel").textContent = "Faculty ID";
    document.getElementById("verificationLabel").textContent = "Verify Department";
  }
}

document.getElementById("resetForm").onsubmit = async function(e){
  e.preventDefault();
  const btn = document.getElementById("submitBtn"), msgDiv = document.getElementById("message");
  btn.textContent="Verifying..."; btn.disabled=true; msgDiv.textContent=""; msgDiv.className="";
  try{
    const response = await fetch(`${API_BASE}/reset_password`, {method:"POST", body:new FormData(this)});
    const data = await response.json();
    if(response.ok && !data.error){
      msgDiv.textContent="✅ "+data.message; msgDiv.className="success"; this.reset(); updateFormUI();
    } else { msgDiv.textContent="❌ "+data.error; msgDiv.className="error"; }
  } catch(e){ msgDiv.textContent="❌ Server offline."; msgDiv.className="error"; }
  finally{ btn.textContent="Reset Password"; btn.disabled=false; }
}
</script>

</body>
</html>
