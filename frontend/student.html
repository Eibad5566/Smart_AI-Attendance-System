<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Enrollment - AI Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
:root{
  --bg-dark:#020617;
  --bg-card:rgba(15,23,42,0.85);
  --text-main:#f8fafc;
  --text-muted:#94a3b8;
  --accent:#0ea5e9;
  --accent-hover:#0284c7;
  --success:#10b981;
  --danger:#ef4444;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg-dark);
  color:var(--text-main);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px;
  overflow-y:auto;
}

/* PARTICLES */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* Scrollbar */
body::-webkit-scrollbar{width:10px;}
body::-webkit-scrollbar-track{background:rgba(15,23,42,0.5);border-radius:5px;}
body::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:5px;}

/* Glass Card */
.card{
  width:420px;
  padding:35px;
  background:var(--bg-card);
  backdrop-filter:blur(12px);
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 25px 45px rgba(0,0,0,.5);
  margin-bottom:30px;
}

/* Titles */
.card h2{text-align:center; color:white; margin-bottom:8px; font-weight:600;}
.card p.subtitle{text-align:center;color:var(--text-muted);margin-bottom:25px;font-size:14px;}

/* Form Inputs */
input{
  width:100%;
  padding:12px 14px;
  margin-bottom:16px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.08);
  background:#020617;
  color:white;
  transition:all .25s ease;
}
input:focus{
  border-color:var(--accent);
  outline:none;
  box-shadow:0 0 8px rgba(14,165,233,.5);
}

/* Camera Box */
.camera-box{
  width:100%;
  border-radius:10px;
  border:2px solid var(--accent);
  overflow:hidden;
  margin-bottom:12px;
}
video, canvas{
  width:100%;
  border-radius:10px;
}

/* Buttons */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  font-weight:500;
  cursor:pointer;
  transition:all .25s ease;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(14,165,233,.5);
}

/* Secondary button */
.capture-btn{
  background:#334155;
  margin-bottom:10px;
}
.capture-btn:hover{
  background:#475569;
}

/* Links */
.links{text-align:center;margin-top:18px;font-size:.9rem;line-height:1.7;}
.links a{color:var(--accent);text-decoration:none;}
.links a:hover{text-decoration:underline;}

/* Messages */
#message{text-align:center;margin-top:12px;font-size:.95rem;}
.success{color:var(--success);}
.error{color:var(--danger);}

/* Preview Image */
.preview{margin-top:10px;text-align:center;}
.preview img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--accent);
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="card">
<h2>Student Enrollment</h2>
<p class="subtitle">Register your face for AI attendance</p>

<form id="registerForm">
    <div class="form-group">
        <label>Student Number</label>
        <input type="text" name="student_number" required>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Create Password</label>
        <input type="password" name="password" required>
    </div>

    <label>Capture Face Photo</label>
    <div class="camera-box">
        <video id="video" autoplay></video>
    </div>

    <button type="button" class="capture-btn" onclick="capturePhoto()">
        <i class="fa-solid fa-camera"></i> Capture Photo
    </button>

    <div class="preview">
        <img id="previewImg" style="display:none;">
    </div>

    <input type="file" name="file" id="fileInput" style="display:none;" required>

    <button type="submit" id="submitBtn">Register Profile</button>

    <div id="message"></div>

    <div class="links">
        Already enrolled? <a href="student_login.html">Login here</a><br>
        <a href="index.html" class="muted">⬅ Back to Home</a>
    </div>
</form>

<canvas id="canvas"></canvas>
</div>

<script>
particlesJS("particles-js",{
"particles":{
"number":{"value":70},
"color":{"value":"#38bdf8"},
"shape":{"type":"circle"},
"opacity":{"value":0.5},
"size":{"value":3},
"line_linked":{
"enable":true,
"distance":150,
"color":"#0ea5e9",
"opacity":0.4,
"width":1
},
"move":{"enable":true,"speed":2}
},
"interactivity":{
"events":{
"onhover":{"enable":true,"mode":"repulse"}
}
}
});

const API_BASE="http://127.0.0.1:8000";
const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{video.srcObject=stream;});

function capturePhoto(){
const canvas=document.getElementById("canvas");
const preview=document.getElementById("previewImg");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

canvas.toBlob(function(blob){
const file=new File([blob],"face.jpg",{type:"image/jpeg"});
const container=new DataTransfer();
container.items.add(file);
document.getElementById("fileInput").files=container.files;

preview.src=URL.createObjectURL(blob);
preview.style.display="block";
},"image/jpeg");
}

document.getElementById("registerForm").onsubmit=async function(e){
e.preventDefault();
const btn=document.getElementById("submitBtn");
const msg=document.getElementById("message");

btn.textContent="Processing Face...";
btn.disabled=true;
msg.textContent="";
msg.className="";

try{
let response=await fetch(`${API_BASE}/register`,{
method:"POST",
body:new FormData(this)
});
let data=await response.json();

if(response.ok && !data.error){
msg.textContent="✅ "+data.message;
msg.className="success";
this.reset();
document.getElementById("previewImg").style.display="none";
}else{
msg.textContent="❌ "+data.error;
msg.className="error";
}
}catch(error){
msg.textContent="❌ Server offline.";
msg.className="error";
}finally{
btn.textContent="Register Profile";
btn.disabled=false;
}
}
</script>

</body>
</html>
