
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal - Smart AI Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* PARTICLES BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */

h1{
font-size:2.6rem;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
margin-bottom:45px;
}

/* CARDS */

.role-grid{
display:flex;
gap:35px;
flex-wrap:wrap;
justify-content:center;
}

.role-card{
background:rgba(15,23,42,0.8);
backdrop-filter:blur(10px);
border-radius:18px;
padding:45px 35px;
width:260px;
cursor:pointer;
transition:.35s;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.role-card:hover{
transform:translateY(-12px) scale(1.05);
border-color:#0ea5e9;
box-shadow:0 30px 50px rgba(14,165,233,.4);
}

.role-icon{
font-size:3.5rem;
margin-bottom:20px;
color:#38bdf8;
}

.role-card h2{
margin-bottom:10px;
}

.role-card p{
font-size:.95rem;
color:#94a3b8;
}

/* BACK BUTTON */

.back-btn{
margin-top:50px;
padding:12px 25px;
background:transparent;
border:1px solid #334155;
color:#94a3b8;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.back-btn:hover{
background:#0ea5e9;
border-color:#0ea5e9;
color:white;
transform:translateY(-2px);
}

/* FOOTER */

footer{
position:absolute;
bottom:20px;
font-size:.8rem;
color:#94a3b8;
}

</style>
</head>

<body>

<div id="particles-js"></div>

<h1>Student Portal</h1>
<p class="subtitle">Access your attendance dashboard</p>

<div class="role-grid">

<div class="role-card" onclick="location.href='student_login.html'">

<div class="role-icon">
<i class="fa-solid fa-chart-column"></i>
</div>

<h2>Login</h2>
<p>View attendance history and classroom records.</p>

</div>

<div class="role-card" onclick="location.href='student.html'">

<div class="role-icon">
<i class="fa-solid fa-camera"></i>
</div>

<h2>Enroll Face</h2>
<p>Register your face for the AI attendance system.</p>

</div>

</div>

<button class="back-btn" onclick="location.href='index.html'">
<i class="fa-solid fa-arrow-left"></i> Back to Main Menu
</button>

<footer>
Smart AI Attendance System • Karabük University
</footer>

<script>

particlesJS("particles-js",{
"particles":{
"number":{"value":70},
"color":{"value":"#38bdf8"},
"shape":{"type":"circle"},
"opacity":{"value":0.5},
"size":{"value":3},
"line_linked":{
"enable":true,
"distance":150,
"color":"#0ea5e9",
"opacity":0.4,
"width":1
},
"move":{"enable":true,"speed":2}
},
"interactivity":{
"events":{
"onhover":{"enable":true,"mode":"repulse"}
}
}
});

</script>

</body>
</html>
